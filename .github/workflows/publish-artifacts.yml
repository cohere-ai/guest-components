name: Publish artifacts with ORAS

on:
  push:
    branches:
    - main
    - cohere
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-aa:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        platform: [
          { tee: none,        arch: x86_64,  libc: musl, runner: ubuntu-24.04 },
          { tee: amd,         arch: x86_64,  libc: musl, runner: ubuntu-24.04 },
          { tee: az-cvm-vtpm, arch: x86_64,  libc: gnu, runner: ubuntu-24.04 },
          { tee: tdx,         arch: x86_64,  libc: musl, runner: ubuntu-24.04 },
          # Cohere fork: AA with TDX + SNP + Azure SNP-vTPM + NVIDIA GPU
          # attesters. It links libtss2 + libnvat, so this variant must use gnu
          # libc, and the resulting tarball bundles libnvat.so*.
          { tee: tdx-snp-nvidia,  arch: x86_64,  libc: gnu, runner: ubuntu-24.04 },
        ]
    runs-on: ${{ matrix.platform.runner }}
    env:
      TEE_PLATFORM: ${{ matrix.platform.tee }}
      LIBC: ${{ matrix.platform.libc }}
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      RUST_TARGET: ${{ matrix.platform.arch }}-unknown-linux-${{ matrix.platform.libc }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Log in to the Container registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
      with:
        version: 1.2.0

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        target: ${{ env.RUST_TARGET }}

    - name: Update apt source list
      run: |
        sudo apt-get update

    - name: Install tpm dependencies
      # az-snp-vtpm-attester links against TSS2.
      if: matrix.platform.tee == 'az-cvm-vtpm' || matrix.platform.tee == 'tdx-snp-nvidia'
      run: |
        sudo apt-get install -y --no-install-recommends libtss2-dev

    - name: Build and install NVIDIA attestation-sdk (libnvat)
      if: matrix.platform.tee == 'tdx-snp-nvidia'
      env:
        # Pinned to the commit currently tagged 2026.03.02 so the build
        # cannot be affected by a force-pushed/retagged upstream release.
        NV_ATTESTATION_SDK_REF: "0c1be386a8fbb8f2766a6a556d10df86f5fed9d3"
        # setup-rust-toolchain sets RUSTFLAGS=-D warnings, which turns new
        # rustc lints into hard errors when cmake's ExternalProject builds
        # the bundled regorus crate (e.g. mismatched_lifetime_syntaxes on
        # rustc 1.83+). Clear it so the third-party crate compiles with its
        # own lint policy.
        RUSTFLAGS: ""
      run: |
        sudo apt-get install -y --no-install-recommends \
          build-essential cmake protobuf-compiler pkg-config clang libssl-dev
        git clone https://github.com/NVIDIA/attestation-sdk /tmp/nv-attestation-sdk
        git -C /tmp/nv-attestation-sdk checkout "${NV_ATTESTATION_SDK_REF}"
        BUILD_DIR=/tmp/nv-attestation-sdk/nv-attestation-sdk-cpp/build
        cmake -S /tmp/nv-attestation-sdk/nv-attestation-sdk-cpp -B "$BUILD_DIR" \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TESTING=OFF
        # Build as runner so cargo's bundled regorus build does not produce
        # root-owned artifacts that the cleanup `rm -rf` can no longer remove
        # (and don't pollute /tmp ownership for downstream steps). Only the
        # install step needs sudo, since it writes to /usr.
        cmake --build "$BUILD_DIR" --parallel "$(nproc)"
        sudo cmake --install "$BUILD_DIR"
        sudo ldconfig
        rm -rf /tmp/nv-attestation-sdk

    - name: Build AA
      env:
        ARCH: ${{ matrix.platform.arch }}
        LIBC: ${{ matrix.platform.libc }}
        NVAT_USE_SYSTEM_LIB: ${{ matrix.platform.tee == 'tdx-snp-nvidia' && '1' || '' }}
      run: |
        make ./target/${{ env.RUST_TARGET }}/release/attestation-agent

    - name: Publish with ORAS
      id: publish
      env:
        OCI_ARCH: ${{ matrix.platform.arch == 'x86_64' && 'amd64' || matrix.platform.arch == 'aarch64' && 'arm64' || matrix.platform.arch == 'powerpc64le' && 'ppc64le' || matrix.platform.arch }}
      run: |
        mkdir oras
        cd oras
        cp ../target/${{ env.RUST_TARGET }}/release/attestation-agent .
        # For the tdx-snp-nvidia variant, AA dynamically links against libnvat.so
        # (NVIDIA attestation-sdk-cpp). Bundle the shared library + its
        # symlinks into lib/ so consumers can install it alongside the binary.
        if [ "${{ matrix.platform.tee }}" = "tdx-snp-nvidia" ]; then
          mkdir -p lib
          # cmake installs libnvat with CMAKE_INSTALL_PREFIX=/usr, so the
          # library lands in /usr/lib on Ubuntu (no /usr/lib64 on multiarch).
          find /usr/lib -maxdepth 3 -name 'libnvat.so*' \
            -exec cp -a {} lib/ \;
          if ! compgen -G "lib/libnvat.so*" >/dev/null; then
            echo "ERROR: libnvat.so not found after attestation-sdk install" >&2
            exit 1
          fi
          tar cJf attestation-agent.tar.xz attestation-agent lib
        else
          tar cJf attestation-agent.tar.xz attestation-agent
        fi
        arch="${{ matrix.platform.arch }}"
        # After building for target powerpc64le, tag and push the image as ppc64le to match standard arch naming.
        [ "$arch" = "powerpc64le" ] && arch="ppc64le"
        arch_tag="${{ github.sha }}-${{ matrix.platform.tee }}_${arch}"
        image="${REGISTRY}/${IMAGE_NAME}/attestation-agent"
        tag="${{ github.sha }}-${{ matrix.platform.tee }}"
        oras push "${image}:${arch_tag}" attestation-agent.tar.xz
        # We need to create the platform annotations with docker, since oras 1.2 doesn't support
        # pushing with platform yet.
        docker manifest create "${image}:${tag}" --amend "${image}:${arch_tag}"
        docker manifest annotate --arch "$OCI_ARCH" --os linux "${image}:${tag}" "${image}:${arch_tag}"
        docker manifest push "${image}:${tag}"
        # add image and digest to output for attestation
        echo "image=${image}" >> "$GITHUB_OUTPUT"
        digest="$(oras manifest fetch "${image}:${arch_tag}" --descriptor | jq -r .digest)"
        echo "digest=${digest}" >> "$GITHUB_OUTPUT"

    - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-name: ${{ steps.publish.outputs.image }}
        subject-digest: ${{ steps.publish.outputs.digest }}
        push-to-registry: true

  publish-cdh-and-asr:
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        arch:
        - x86_64
        include:
        - arch: x86_64
          libc: musl
          instance: ubuntu-24.04
    runs-on: ${{ matrix.instance }}
    env:
      LIBC: ${{ matrix.libc }}
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
      RUST_TARGET: ${{ matrix.arch }}-unknown-linux-${{ matrix.libc }}
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
      with:
        egress-policy: audit

    - name: Log in to the Container registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0
      with:
        version: 1.2.0

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        target: ${{ env.RUST_TARGET }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libdevmapper-dev pkg-config
        if [ "${{ matrix.arch }}" = "powerpc64le" ]; then
          sudo apt-get install -y libclang-dev cmake protobuf-compiler
        fi

    - name: Build CDH
      env:
        ARCH: ${{ matrix.arch }}
        LIBC: ${{ matrix.libc }}
      run: make ./target/${{ env.RUST_TARGET }}/release/confidential-data-hub

    - name: Build ASR
      env:
        ARCH: ${{ matrix.arch }}
        LIBC: ${{ matrix.libc }}
      run: make ./target/${{ env.RUST_TARGET }}/release/api-server-rest

    - name: Publish CDH + ASR with ORAS
      id: publish
      run: |
        arch="${{ matrix.arch }}"
        # After building for target powerpc64le, tag and push the image as ppc64le to match standard arch naming.
        [ "$arch" = "powerpc64le" ] && arch="ppc64le"
        tag="${{ github.sha }}-${arch}"
        mkdir oras
        cd oras
        cp ../target/${{ env.RUST_TARGET }}/release/{confidential-data-hub,api-server-rest} .

        tar cJf confidential-data-hub.tar.xz confidential-data-hub
        image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/confidential-data-hub"
        oras push "${image}:${tag}" confidential-data-hub.tar.xz
        echo "cdh-image=${image}" >> "$GITHUB_OUTPUT"
        digest="$(oras manifest fetch "${image}:${tag}" --descriptor | jq -r .digest)"
        echo "cdh-digest=${digest}" >> "$GITHUB_OUTPUT"

        tar cJf api-server-rest.tar.xz api-server-rest
        image="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-server-rest"
        oras push "${image}:${tag}" api-server-rest.tar.xz
        echo "asr-image=${image}" >> "$GITHUB_OUTPUT"
        digest="$(oras manifest fetch "${image}:${tag}" --descriptor | jq -r .digest)"
        echo "asr-digest=${digest}" >> "$GITHUB_OUTPUT"

    - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-name: ${{ steps.publish.outputs.cdh-image }}
        subject-digest: ${{ steps.publish.outputs.cdh-digest }}
        push-to-registry: true

    - uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-name: ${{ steps.publish.outputs.asr-image }}
        subject-digest: ${{ steps.publish.outputs.asr-digest }}
        push-to-registry: true
